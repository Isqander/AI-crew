# ===========================================
# AI-crew Docker Compose — Development / Staging
# ===========================================
# Separate services: Postgres, Aegra, Gateway, Langfuse, Frontend, Telegram.
#
# Usage:
#   docker-compose up -d              # Start all services
#   docker-compose up -d aegra        # Only backend + DB
#   docker-compose logs -f aegra      # View Aegra logs
#   docker-compose down               # Stop all services
#
# For VPS deployment, set env vars in .env file.

services:
  # ===========================================
  # PostgreSQL Database
  # ===========================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aicrew-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aicrew}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aicrew_secret_password}
      POSTGRES_DB: ${POSTGRES_DB:-aicrew}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aicrew} -d ${POSTGRES_DB:-aicrew}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default    # aicrew-network — для postgres
      - dokploy    # dokploy-network — для Traefik

  # ===========================================
  # Aegra Server (LangGraph Backend)
  # Internal only — accessed via Gateway
  # ===========================================
  aegra:
    build:
      context: .
      dockerfile: Dockerfile.aegra
    container_name: aicrew-aegra
    restart: unless-stopped
    expose:
      - "8000"                          # Internal only — not published to host
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aicrew}:${POSTGRES_PASSWORD:-aicrew_secret_password}@postgres:5432/${POSTGRES_DB:-aicrew}
      POSTGRES_USER: ${POSTGRES_USER:-aicrew}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aicrew_secret_password}
      POSTGRES_DB: ${POSTGRES_DB:-aicrew}
      POSTGRES_PORT: 5432
      POSTGRES_HOST: postgres

      # Aegra Config
      AEGRA_CONFIG: /app/aegra.json
      HOST: 0.0.0.0
      PORT: 8000
      DEBUG: ${DEBUG:-true}

      # LLM (all models via custom OpenAI-compatible endpoint)
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_API_URL: ${LLM_API_URL:-}

      # Langfuse (client — talks to the langfuse container)
      LANGFUSE_ENABLED: ${LANGFUSE_ENABLED:-false}
      LANGFUSE_LOGGING: ${LANGFUSE_LOGGING:-false}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_HOST: http://langfuse:3000

      # GitHub
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_DEFAULT_REPO: ${GITHUB_DEFAULT_REPO:-}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
      ENV_MODE: ${ENV_MODE:-LOCAL}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 1200s       # 20 min — reduce log noise from frequent health checks
      timeout: 10s
      retries: 3
      start_period: 30s     # Allow 30s for initial startup before first check

  # ===========================================
  # Gateway (FastAPI — auth, proxy, endpoints)
  # ===========================================
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: aicrew-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-8081}:8081"
    environment:
      AEGRA_URL: http://aegra:8000
      DATABASE_URL: postgresql://${POSTGRES_USER:-aicrew}:${POSTGRES_PASSWORD:-aicrew_secret_password}@postgres:5432/${POSTGRES_DB:-aicrew}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-1800}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-604800}
      LLM_API_URL: ${LLM_API_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENV_MODE: ${ENV_MODE:-LOCAL}
      # CORS — JSON array of allowed origins
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:5173","http://localhost:3001"]}
    depends_on:
      aegra:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - default    # aicrew-network — для postgres
      - dokploy    # dokploy-network — для Traefik

  # ===========================================
  # Langfuse (Observability)
  # ===========================================
  langfuse:
    image: langfuse/langfuse:2
    container_name: aicrew-langfuse
    restart: unless-stopped
    ports:
      - "${LANGFUSE_PORT:-3001}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-aicrew}:${POSTGRES_PASSWORD:-aicrew_secret_password}@postgres:5432/${POSTGRES_DB:-aicrew}?schema=${LANGFUSE_SCHEMA:-langfuse}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-mysecretkey}
      SALT: ${LANGFUSE_SALT:-mysalt}
      NEXTAUTH_URL: ${LANGFUSE_NEXTAUTH_URL:-http://localhost:3001}
      TELEMETRY_ENABLED: "false"
      HOSTNAME: "0.0.0.0"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default    # aicrew-network — для postgres
      - dokploy    # dokploy-network — для Traefik


  # ===========================================
  # Frontend (React + Vite)
  # Development: Vite dev server
  # Production: nginx + static build
  # ===========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: ${FRONTEND_DOCKERFILE:-Dockerfile.dev}
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8081}
    container_name: aicrew-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:${FRONTEND_INTERNAL_PORT:-5173}"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8081}
    depends_on:
      - gateway
    networks:
      - default    # aicrew-network — для postgres
      - dokploy    # dokploy-network — для Traefik

  # ===========================================
  # Telegram Bot
  # ===========================================
  telegram:
    build:
      context: ./telegram
      dockerfile: Dockerfile
    container_name: aicrew-telegram
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      GATEWAY_URL: http://gateway:8081
      TELEGRAM_BOT_EMAIL: ${TELEGRAM_BOT_EMAIL:-bot@ai-crew.local}
      TELEGRAM_BOT_PASSWORD: ${TELEGRAM_BOT_PASSWORD:-botpassword123}
      TELEGRAM_ADMIN_CHAT_ID: ${TELEGRAM_ADMIN_CHAT_ID:-}
    depends_on:
      gateway:
        condition: service_started
    # No ports — polling mode
#    profiles:
#      - telegram  # Only starts with: docker-compose --profile telegram up

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: aicrew-network
  dokploy:
    external: true
    name: dokploy-network

