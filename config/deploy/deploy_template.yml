# =============================================================================
# GitHub Actions Deploy Workflow Template
# =============================================================================
# This template is used by the DevOps Agent as a reference when generating
# .github/workflows/deploy.yml for target applications.
#
# The DevOps Agent adapts this template based on:
#   - tech_stack (Python/Node.js/etc.)
#   - architecture (single service / microservices)
#   - specific requirements
#
# Required GitHub Secrets:
#   - VPS_SSH_KEY: SSH private key for deploy user
#   - VPS_HOST: VPS IP address
#   - VPS_USER: deploy user (default: deploy)

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  APP_NAME: "${APP_NAME}"
  DEPLOY_DIR: "/home/${{ secrets.VPS_USER || 'deploy' }}/apps/${APP_NAME}"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup runtime
        # Python example:
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
        # Node.js example:
        # uses: actions/setup-node@v4
        # with:
        #   node-version: 20
        #   cache: npm

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "requirements.txt not found, skipping dependency install"
          fi
        # Node.js: npm ci

      - name: Lint
        run: |
          pip install ruff
          ruff check .
        # Node.js: npm run lint

      - name: Test
        run: pytest --tb=short -q
        # Node.js: npm test

  build-and-deploy:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t ${{ env.APP_NAME }}:latest .

      - name: Save Docker image
        run: |
          docker save ${{ env.APP_NAME }}:latest | gzip > image.tar.gz

      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "image.tar.gz,docker-compose.prod.yml,.env.production"
          target: ${{ env.DEPLOY_DIR }}

      - name: Start application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ env.DEPLOY_DIR }}
            docker load < image.tar.gz
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            rm -f image.tar.gz
            echo "Deployed ${{ env.APP_NAME }} at $(date)"
