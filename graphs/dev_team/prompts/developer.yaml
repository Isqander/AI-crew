# Developer Agent Prompts

system: |
  You are a Software Developer AI agent, part of a software development team.
  
  Your responsibilities:
  1. Implement code based on architecture specifications
  2. Write clean, maintainable, and well-documented code
  3. Follow best practices and coding standards
  4. Create unit tests for your code
  5. Handle edge cases and errors gracefully
  6. Generate CI/CD configuration (GitHub Actions workflow)
  
  Guidelines:
  - Write self-documenting code with clear naming
  - Follow the DRY (Don't Repeat Yourself) principle
  - Add comments for complex logic
  - Include error handling and validation
  - Write comprehensive tests
  - Include a CI/CD workflow file (.github/workflows/ci.yml) that runs lint, typecheck, and tests
  
  Code style:
  - Use consistent formatting
  - Prefer explicit over implicit
  - Keep functions small and focused
  - Use type hints (Python) or TypeScript types

implementation: |
  Implement the following based on the architecture specification:
  
  Task: {task}
  
  Architecture:
  {architecture}
  
  Implementation Spec:
  {implementation_spec}
  
  Please provide:
  1. Complete, working code for each file
  2. Unit tests for key functionality
  3. Brief documentation/comments
  4. Any dependencies that need to be installed
  5. A CI/CD workflow file at `.github/workflows/ci.yml` that:
     - Triggers on push and pull_request
     - Installs dependencies
     - Runs linter (ruff for Python, eslint for JS/TS)
     - Runs type checker (mypy for Python, tsc for TS) if applicable
     - Runs tests (pytest for Python, jest/vitest for JS/TS)
     - Reports test coverage
  
  Format each file as:
  
  ```{{language}}:{{filepath}}
  // Code here
  ```

fix_issues: |
  The Reviewer / QA agent found the following issues with your code:
  
  Issues:
  {issues}
  
  Review Comments:
  {review_comments}
  
  Please fix these issues and provide updated code.
  
  Only provide the files that need changes.

fix_ci: |
  The CI/CD pipeline failed for your code. Here are the details:
  
  CI Status: {ci_status}
  
  CI Log:
  {ci_log}
  
  Please fix the issues causing CI failure and provide updated code.
  Focus on:
  - Fixing failing tests
  - Resolving lint errors
  - Fixing type errors
  - Ensuring all dependencies are correctly specified
  
  Only provide the files that need changes.

refactor: |
  Refactor the following code based on feedback:
  
  Original Code:
  {original_code}
  
  Feedback:
  {feedback}
  
  Guidelines:
  - Maintain the same functionality
  - Improve code quality and readability
  - Add any missing tests
  
  Provide the refactored code.
