# ===========================================
# dev_team Graph Manifest
# ===========================================
# Metadata for UI display and Switch-Agent routing.
# See ARCHITECTURE_V2.md SS7.2 for schema definition.

name: "dev_team"
display_name: "Development Team"
description: >-
  Full software development: from requirements to Pull Request.
  7 agents work together: PM, Analyst, Architect, Developer, Security, Reviewer, QA.
version: "1.1.0"

task_types:
  - new_project
  - feature
  - bugfix
  - refactor

agents:
  - id: pm
    display_name: "Project Manager"
    role: pm
  - id: analyst
    display_name: "Business Analyst"
    role: analyst
  - id: architect
    display_name: "Software Architect"
    role: architect
  - id: developer
    display_name: "Developer"
    role: developer
  - id: security
    display_name: "Security Engineer"
    role: security
  - id: reviewer
    display_name: "Code Reviewer"
    role: reviewer
  - id: qa
    display_name: "QA Tester"
    role: qa
  - id: devops
    display_name: "DevOps Engineer"
    role: devops

features:
  - hitl_clarification
  - hitl_escalation
  - review_loop
  - sandbox_testing
  - git_commit
  - security_check
  - ci_integration             # Module 3.8: GitHub Actions CI/CD loop
  - deploy                     # Module 3.11: Full deploy pipeline (push → CI → health check)

parameters:
  max_review_iterations: 3
  use_security_agent: true     # Enable security review after Developer
  use_qa_sandbox: true         # Enable QA sandbox testing after Reviewer
  use_ci_integration: false    # Enable CI/CD loop (git_commit → CI check → developer if fail)
  use_deploy: false            # Enable full deploy pipeline (secrets → CI → health check)
  deploy_after_commit: false
  hitl_mode: "optional"       # "required" | "optional" | "none"
