# ===========================================
# standard_dev Graph Manifest
# ===========================================
# Medium-complexity development workflow.
# PM -> Developer -> Reviewer (with limited loop) -> git_commit -> END.
# No HITL -- fully autonomous.

name: "standard_dev"
display_name: "Standard Developer"
description: >-
  Autonomous development for medium-complexity tasks.
  PM gathers requirements, Developer writes code, Reviewer reviews.
  Limited review loop (max 2 iterations), no human intervention.
version: "1.1.0"

task_types:
  - feature
  - bugfix
  - refactor
  - api

agents:
  - id: pm
    display_name: "Project Manager"
    role: pm
  - id: developer
    display_name: "Developer"
    role: developer
  - id: reviewer
    display_name: "Code Reviewer"
    role: reviewer

features:
  - review_loop
  - git_commit

parameters:
  max_review_iterations: 2
  hitl_mode: "none"
  deploy_after_commit: false
