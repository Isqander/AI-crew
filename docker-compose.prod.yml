# ===========================================
# AI-crew Docker Compose — Production Override
# ===========================================
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# This override:
#   - Uses production frontend Dockerfile (nginx)
#   - Hides Postgres port from host
#   - Sets production env defaults

services:
  postgres:
    ports: !reset []    # Don't expose Postgres externally in production
    expose:
      - "5432"

  frontend:
    build:
      dockerfile: Dockerfile        # Production: nginx + static build
    ports:
      - "${FRONTEND_PORT:-5173}:80" # nginx serves on port 80
    environment:
      VITE_API_URL: ${VITE_API_URL}

  gateway:
    environment:
      ENV_MODE: PRODUCTION
      LOG_LEVEL: INFO

  aegra:
    environment:
      ENV_MODE: PRODUCTION
      LOG_LEVEL: INFO
